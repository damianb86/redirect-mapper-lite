name: ${COMPOSE_PROJECT_NAME:?Set COMPOSE_PROJECT_NAME in the app .env}

services:
  db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in ../shared-docker/.env}
      APP_DB_NAME: ${APP_DB_NAME:?Set APP_DB_NAME in the app .env}
      APP_DB_USER: ${APP_DB_USER:?Set APP_DB_USER in the app .env}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in the app .env}
    volumes:
      - ./docker/app/init-db.sh:/init-db.sh:ro
    command: ["/bin/sh", "/init-db.sh"]
    networks:
      - shared_apps

  app:
    build: .
    restart: unless-stopped
    init: true
    expose:
      - "3000"
    environment:
      APP_ENV: production
      NODE_ENV: production
      NODE_OPTIONS: ${NODE_OPTIONS}
      PORT: 3000
      SHOPIFY_API_KEY: ${SHOPIFY_API_KEY:?Set SHOPIFY_API_KEY in the app .env}
      SHOPIFY_API_SECRET: ${SHOPIFY_API_SECRET:?Set SHOPIFY_API_SECRET in the app .env}
      SHOPIFY_BILLING_TEST: ${SHOPIFY_BILLING_TEST:-false}
      SCOPES: ${SCOPES:?Set SCOPES in the app .env}
      DATABASE_URL: postgresql://${APP_DB_USER:?Set APP_DB_USER in the app .env}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD in the app .env}@postgres:5432/${APP_DB_NAME:?Set APP_DB_NAME in the app .env}?schema=public&connection_limit=3
      SHOPIFY_APP_URL: ${PROD_SHOPIFY_APP_URL:-${SHOPIFY_APP_URL}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_WIZARD_DISABLED: ${AI_WIZARD_DISABLED:-false}
      AI_WIZARD_MODEL: ${AI_WIZARD_MODEL:-gpt-5-mini}
      AI_WIZARD_FALLBACK_MODEL: ${AI_WIZARD_FALLBACK_MODEL:-gpt-5.5}
      AI_WIZARD_CONFIDENCE_THRESHOLD: ${AI_WIZARD_CONFIDENCE_THRESHOLD:-0.55}
      AI_WIZARD_REASONING_EFFORT: ${AI_WIZARD_REASONING_EFFORT:-}
      CONTACT_EMAIL: ${CONTACT_EMAIL:?Set CONTACT_EMAIL in the app .env}
      EMAIL_HOST: ${EMAIL_HOST:?Set EMAIL_HOST in the app .env}
      EMAIL_PORT: ${EMAIL_PORT:?Set EMAIL_PORT in the app .env}
      EMAIL_USER: ${EMAIL_USER:?Set EMAIL_USER in the app .env}
      EMAIL_PASS: ${EMAIL_PASS:?Set EMAIL_PASS in the app .env}
      APP_NAME: ${APP_NAME:-redirect-mapper-lite}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_DIR: ${LOG_DIR:-/app/logs}
      LOG_TO_FILE: ${LOG_TO_FILE:-true}
    volumes:
      - ${APP_LOG_DIR:-./logs}:/app/logs
    labels:
      observability.stack: qorve
      observability.app: redirect-mapper-lite
      observability.service: app
      caddy: ${APP_HOST:?Set APP_HOST in the app .env}
      caddy.encode: zstd gzip
      caddy.reverse_proxy: "{{upstreams 3000}}"
      caddy_ingress_network: ${SHARED_DOCKER_NETWORK:-shared_apps}
    logging:
      driver: json-file
      options:
        max-size: ${DOCKER_LOG_MAX_SIZE:-10m}
        max-file: ${DOCKER_LOG_MAX_FILE:-5}
    depends_on:
      db-init:
        condition: service_completed_successfully
    networks:
      - shared_apps

networks:
  shared_apps:
    external: true
    name: ${SHARED_DOCKER_NETWORK:-shared_apps}
